<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #fff; color: #1a1a1a;
    }
    .header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px 8px;
    }
    .header-icon {
      width: 20px; height: 20px; border-radius: 4px;
      background: url('icons/icon48.png') center/contain no-repeat;
    }
    .header-text { flex: 1; font-size: 12px; font-weight: 600; }
    .header-url { font-size: 10px; color: #aaa; font-weight: 400; }
    .site-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 16px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .site-label { font-size: 12px; }
    .site-label small { color: #999; font-weight: 400; }
    .switch { position: relative; width: 34px; height: 20px; flex-shrink: 0; }
    .switch input { display: none; }
    .track {
      position: absolute; inset: 0; background: #ccc; border-radius: 10px;
      transition: background .2s; cursor: pointer;
    }
    .track::before {
      content: ''; position: absolute; left: 2px; top: 2px;
      width: 16px; height: 16px; background: #fff; border-radius: 50%;
      transition: transform .2s cubic-bezier(.4,.2,.2,1);
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }
    .switch input:checked + .track { background: #d62828; }
    .switch input:checked + .track::before { transform: translateX(14px); }
    .tool-area { padding: 10px 16px 14px; }
    .box-row { display: flex; flex-direction: column; gap: 6px; }
    .box-wrap { position: relative; }
    .box {
      border: 1px solid #e8e8e8; border-radius: 8px;
      padding: 8px 32px 8px 10px; min-height: 36px;
      font-size: 14px; line-height: 1.5;
      outline: none;
      white-space: pre-wrap; word-wrap: break-word;
      transition: border-color .2s;
    }
    .box:focus { border-color: #d62828; }
    .box:empty::before { content: attr(ph); color: #ccc; }
    .box.output {
      background: #f9f9f9; color: #555;
    }
    .box.output:focus { border-color: #e8e8e8; }
    .copy-btn {
      position: absolute; top: 6px; right: 6px;
      width: 24px; height: 24px; padding: 4px;
      border: 1px solid #e0e0e0; border-radius: 5px;
      background: #fff; cursor: pointer;
      opacity: 0; transition: opacity .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .box-wrap:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: #f5f5f5; border-color: #ccc; }
    .copy-btn.copied { opacity: 1; border-color: #2da44e; }
    .copy-btn svg { width: 14px; height: 14px; fill: none; stroke: #666; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .copy-btn.copied svg { stroke: #2da44e; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon"></div>
    <div class="header-text">
      Han Ruby
      <span class="header-url" id="url"></span>
    </div>
  </div>
  <div class="site-row">
    <div class="site-label">
      Pinyin ruby
      <small>· <span id="status"></span></small>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="track"></span>
    </label>
  </div>
  <div class="tool-area">
    <div class="box-row">
      <div class="box-wrap">
        <div id="hanInput" class="box" ph="Nhập chữ Hán..." contenteditable></div>
        <button class="copy-btn" data-target="hanInput" title="Sao chép"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
      </div>
      <div class="box-wrap">
        <div id="pinyinOutput" class="box output" ph="Pinyin"></div>
        <button class="copy-btn" data-target="pinyinOutput" title="Sao chép"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
