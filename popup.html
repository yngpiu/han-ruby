<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px; padding: 20px;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: #d62828; }
    .url { font-size: 11px; color: #888; word-break: break-all; margin-bottom: 14px; }
    .toggle-wrap {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: #f8f9fa; border-radius: 8px;
    }
    .toggle-wrap label { font-size: 13px; font-weight: 500; }
    .switch { position: relative; width: 44px; height: 24px; cursor: pointer; }
    .switch input { display: none; }
    .slider {
      position: absolute; inset: 0; background: #ccc; border-radius: 12px; transition: .2s;
    }
    .slider::before {
      content: ''; position: absolute; left: 3px; top: 3px;
      width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: .2s;
    }
    .switch input:checked + .slider { background: #d62828; }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    .status { font-size: 12px; margin-top: 10px; color: #666; }
  </style>
</head>
<body>
  <h1>Han Ruby</h1>
  <div class="url" id="url"></div>
  <div class="toggle-wrap">
    <label for="toggle">Pinyin ruby</label>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
