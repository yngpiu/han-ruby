<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Han Ruby - Công cụ Pinyin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Noto Sans', sans-serif;
      background: #f5f5f5; min-height: 100vh; padding: 40px 20px;
    }
    .container {
      max-width: 960px; margin: 0 auto;
    }
    h1 {
      font-size: 22px; font-weight: 600; color: #1a1a1a;
      display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
    }
    h1 img { width: 28px; height: 28px; }
    .grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    .panel {
      background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 16px;
    }
    .panel-label {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; color: #999; margin-bottom: 10px;
    }
    textarea {
      width: 100%; height: 300px; border: none; outline: none;
      resize: vertical; font-size: 18px; line-height: 1.7; padding: 4px;
      font-family: 'Noto Sans', 'Segoe UI', system-ui, sans-serif;
      color: #1a1a1a;
    }
    textarea::placeholder { color: #bbb; }
    #output {
      font-size: 18px; line-height: 1.7; padding: 4px; min-height: 300px;
      white-space: pre-wrap; word-wrap: break-word; color: #555;
    }
    .empty-msg { color: #bbb; font-size: 18px; }
    .footer {
      margin-top: 24px; text-align: center; font-size: 12px; color: #bbb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <img src="icons/icon48.png" alt="">
      Han Ruby — Chuyển đổi Pinyin
    </h1>
    <div class="grid">
      <div class="panel">
        <div class="panel-label">Hán tự</div>
        <textarea id="input" placeholder="Nhập chữ Hán..."></textarea>
      </div>
      <div class="panel">
        <div class="panel-label">Pinyin</div>
        <div id="output"><span class="empty-msg">Pinyin sẽ hiện ở đây</span></div>
      </div>
    </div>
    <div class="footer">Gõ chữ Hán — pinyin cập nhật theo thời gian thực</div>
  </div>
  <script src="tool.js"></script>
</body>
</html>
